# fly.toml — Gravio platform on Fly.io
# App: gravio-platform
# Docs: https://fly.io/docs/reference/configuration/

app = "gravio-platform"
primary_region = "lax"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite DB
[[mounts]]
  source = "gravio_data"
  destination = "/data"
  initial_size = "1gb"
