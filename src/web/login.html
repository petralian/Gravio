<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravio — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="auth-shell">

    <a href="/" class="auth-brand" aria-label="Gravio home">
      <svg width="28" height="28" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <rect width="26" height="26" rx="6" fill="rgba(0,229,255,0.1)"/>
        <path d="M7 13a6 6 0 1 1 6 6H7v-2.5h6a3.5 3.5 0 1 0-3.5-3.5H7V13z" fill="#00e5ff"/>
      </svg>
      <span>gravio</span>
    </a>

    <div class="auth-card">

      <!-- Tab switcher -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab auth-tab-active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" type="button">Sign in</button>
        <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register" type="button">Create account</button>
      </div>

      <!-- Login panel -->
      <div id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <form class="auth-form" id="form-login" novalidate>
          <div class="auth-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="auth-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <p class="auth-error" id="login-error" hidden></p>
          <button class="m-btn m-btn-neon auth-submit" type="submit" id="login-submit">Sign in →</button>
          <a href="/auth/sso/google/start" class="m-btn m-btn-outline auth-submit" id="login-sso-google" hidden>Continue with Google</a>
        </form>

        <!-- Magic link toggle -->
        <div class="auth-divider"><span>or</span></div>
        <div id="magic-link-section">
          <form class="auth-form" id="form-magic-link" novalidate>
            <div class="auth-field">
              <label for="magic-email">Email a sign-in link</label>
              <input type="email" id="magic-email" name="email" autocomplete="email" placeholder="you@example.com" />
            </div>
            <p class="auth-error" id="magic-error" hidden></p>
            <p class="auth-help" id="magic-success" hidden>Check your email &mdash; a sign-in link is on its way.</p>
            <button class="m-btn m-btn-outline auth-submit" type="submit" id="magic-submit">Send sign-in link</button>
          </form>
        </div>
      </div>

      <!-- Register panel -->
      <div id="panel-register" role="tabpanel" aria-labelledby="tab-register" hidden>
        <form class="auth-form" id="form-register" novalidate>
          <div class="auth-field">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" name="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="auth-field">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" autocomplete="new-password" placeholder="Min. 12 chars, mixed case, number, symbol" minlength="12" required />
            <p class="auth-help">Use at least 12 characters with uppercase, lowercase, number, and symbol.</p>
          </div>
          <div class="auth-field">
            <label for="reg-confirm">Confirm password</label>
            <input type="password" id="reg-confirm" name="confirm" autocomplete="new-password" placeholder="••••••••" required />
          </div>
          <p class="auth-error" id="reg-error" hidden></p>
          <button class="m-btn m-btn-neon auth-submit" type="submit" id="reg-submit">Create account →</button>
          <a href="/auth/sso/google/start" class="m-btn m-btn-outline auth-submit" id="register-sso-google" hidden>Continue with Google</a>
        </form>
      </div>

    </div>

    <p class="auth-footer-note">
      <a href="/onboarding">New here? Start with guided onboarding</a><br/>
      <a href="/">← Back to gravio.dev</a>
    </p>

  </div>

  <script src="login.js"></script>
</body>
</html>
