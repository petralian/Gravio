<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravio — Dashboard</title>
  <meta name="description" content="View and manage your AI agent quality projects on the Gravio dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard">

  <div data-site-header></div>

  <main class="db-main m-container">

    <!-- ═══ VIEW: PROJECTS HOME ═══ -->
    <div id="db-view-projects">

      <div class="db-ph-header">
        <div class="db-ph-title-row">
          <div>
            <p class="m-eyebrow">PROJECTS</p>
            <h1 class="db-h1">Your projects</h1>
          </div>
          <a href="/settings" class="m-btn m-btn-outline m-btn-sm">Settings</a>
        </div>
        <div class="db-ph-controls">
          <div class="db-search-wrap">
            <input type="search" id="db-search" class="db-search-input" placeholder="Search projects…" autocomplete="off" />
          </div>
          <select id="db-sort" class="db-sort-select">
            <option value="recent">Most recent</option>
            <option value="score-asc">Lowest score</option>
            <option value="score-desc">Highest score</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>

      <p class="db-error" id="db-ph-error" hidden></p>

      <div class="db-projects-grid" id="db-projects-grid"></div>

      <div id="db-projects-empty" hidden>
        <div class="db-empty-state">
          <p class="db-empty-title">No projects yet</p>
          <p class="db-empty-sub">Run <code>node gravio.mjs --once</code> in your repo to publish your first scan.</p>
          <a href="/onboarding" class="m-btn m-btn-neon m-btn-sm" style="margin-top:20px">Get started →</a>
        </div>
      </div>

    </div>

    <!-- ═══ VIEW: PROJECT WORKSPACE ═══ -->
    <div id="db-view-workspace" hidden>

      <!-- Breadcrumb -->
      <div class="db-ws-nav">
        <button class="db-back-btn" id="db-back-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          All projects
        </button>
      </div>

      <!-- Hero header -->
      <div class="db-ws-hero">
        <div class="db-ws-hero-left">
          <p class="db-ws-project-name" id="db-ws-project-name">—</p>
          <div class="db-ws-meta-row">
            <span id="db-ws-scan-count">—</span>
            <span class="db-ws-sep">·</span>
            <span id="db-ws-last-scan">—</span>
          </div>
        </div>
        <div class="db-ws-hero-right">
          <p class="db-ws-score-value" id="db-ws-score">—</p>
          <div class="db-ws-badges" id="db-ws-badges"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="db-tabs" role="tablist">
        <button class="db-tab db-tab-active" role="tab" data-tab="overview" type="button">Overview</button>
        <button class="db-tab" role="tab" data-tab="scans" type="button">Scans</button>
        <button class="db-tab" role="tab" data-tab="recommendations" type="button">Recommendations</button>
      </div>

      <p class="db-error" id="db-ws-error" hidden></p>

      <!-- Tab: Overview -->
      <div class="db-tab-panel" id="db-tab-overview">
        <div class="db-overview-stats">
          <div class="db-stat-card">
            <p class="db-stat-label">Total scans</p>
            <p class="db-stat-value" id="db-ov-total">—</p>
          </div>
          <div class="db-stat-card">
            <p class="db-stat-label">Best score</p>
            <p class="db-stat-value" id="db-ov-best">—</p>
          </div>
          <div class="db-stat-card">
            <p class="db-stat-label">Average score</p>
            <p class="db-stat-value" id="db-ov-avg">—</p>
          </div>
        </div>
        <div id="db-ov-summary"></div>
        <div id="db-ov-recent"></div>
      </div>

      <!-- Tab: Scans -->
      <div class="db-tab-panel" id="db-tab-scans" hidden>
        <div class="db-scan-actions">
          <button class="m-btn m-btn-outline m-btn-sm" id="db-delete-selected" type="button">Delete selected</button>
        </div>
        <div class="db-delete-confirm" id="db-delete-confirm" hidden>
          <p>Delete selected scans? This cannot be undone.</p>
          <div class="db-delete-confirm-actions">
            <button class="m-btn m-btn-outline m-btn-sm" style="border-color:var(--danger);color:var(--danger)" id="db-confirm-delete" type="button">Yes, delete</button>
            <button class="m-btn m-btn-outline m-btn-sm" id="db-cancel-delete" type="button">Cancel</button>
          </div>
        </div>
        <div class="db-scan-table-wrap">
          <table class="db-scan-table">
            <thead>
              <tr>
                <th>Select</th>
                <th>Run</th>
                <th>Published</th>
                <th>Score</th>
                <th>Rating</th>
              </tr>
            </thead>
            <tbody id="db-scan-rows"></tbody>
          </table>
        </div>
      </div>

      <!-- Tab: Recommendations -->
      <div class="db-tab-panel" id="db-tab-recommendations" hidden>
        <ul class="db-recs-list" id="db-recs-list"></ul>
      </div>

    </div>

  </main>

  <div data-site-footer></div>

  <script src="site-chrome.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
